{% extends "base.html" %}

{% block extrahead %}
  {% if page and page.meta %}
  <meta property="og:title" content="{{ page.meta.title | d(page.title, true) }} - {{ config.site_name }}" />
  <meta property="og:description" content="{{ page.meta.description | d(config.site_description, true) }}" />
  <meta property="og:url" content="{{ page.canonical_url }}" />
  {% if page.meta.description %}
  <meta name="description" content="{{ page.meta.description }}" />
  {% endif %}
  <meta name="twitter:title" content="{{ page.meta.title | d(page.title, true) }} - {{ config.site_name }}" />
  <meta name="twitter:description" content="{{ page.meta.description | d(config.site_description, true) }}" />
  {% else %}
  <meta property="og:title" content="{{ config.site_name }}" />
  <meta property="og:description" content="{{ config.site_description }}" />
  <meta name="twitter:title" content="{{ config.site_name }}" />
  <meta name="twitter:description" content="{{ config.site_description }}" />
  {% endif %}
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://raw.githubusercontent.com/teleproxy/teleproxy/main/branding/github-social-preview.png" />
  <meta property="og:image:width" content="1280" />
  <meta property="og:image:height" content="640" />
  <meta name="twitter:card" content="summary_large_image" />
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "Teleproxy",
    "description": "{{ config.site_description }}",
    "url": "{{ config.site_url }}",
    "applicationCategory": "NetworkApplication",
    "operatingSystem": "Linux",
    "license": "https://opensource.org/licenses/GPL-2.0",
    "downloadUrl": "https://github.com/teleproxy/teleproxy/releases/latest",
    "softwareVersion": "{{ config.extra.version }}",
    "author": {
      "@type": "Person",
      "name": "R. Kline"
    },
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    }
  }
  </script>
{% endblock %}

{% block footer %}
  <footer class="md-footer">
    <div class="md-footer-meta md-typeset">
      <div class="md-footer-meta__inner md-grid">
        <div class="md-copyright">R. Kline &copy; &middot; <a href="https://t.me/tribute/app?startapp=dIa9" target="_blank" rel="noopener">Donate</a> &middot; <a href="https://app.tonkeeper.com/transfer/UQCRB931D__Q2YQmAbUfcuHQ7fHsG3_3At7e6pUtNa6b9bTh" target="_blank" rel="noopener">TON</a></div>
      </div>
    </div>
  </footer>
{% endblock %}
